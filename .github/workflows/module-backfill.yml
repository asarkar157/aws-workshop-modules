name: StackGen Module Backfill

# Manually triggered — pushes ALL existing releases to StackGen
# Uploads in strict semver-ascending order so StackGen marks the latest version correctly.
# For fork users: configure STACKGEN_TOKEN (secret) and STACKGEN_URL (variable)
# For multi-instance users: optionally configure STACKGEN_TOKEN_2 / STACKGEN_URL_2
on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run — preview what would be pushed without uploading"
        type: boolean
        default: true
      target:
        description: "Which StackGen instance to push to (use 'primary' for fork setups)"
        type: choice
        options:
          - primary
          - all
          - secondary
        default: primary

jobs:
  backfill:
    name: Backfill all releases (sequential)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0  # Fetch all history to access tags

      - name: Validate configuration
        run: |
          TARGET="${{ github.event.inputs.target }}"

          if [ "$TARGET" = "primary" ] || [ "$TARGET" = "all" ]; then
            if [ -z "${{ secrets.STACKGEN_TOKEN_1 }}" ] || [ -z "${{ vars.STACKGEN_URL_1 }}" ]; then
              echo "❌ STACKGEN_TOKEN or STACKGEN_URL not configured"
              echo "   Set STACKGEN_TOKEN as a repository secret"
              echo "   Set STACKGEN_URL as a repository variable"
              exit 1
            fi
            echo "✅ Primary instance configured: ${{ vars.STACKGEN_URL_1 }}"
          fi

          if [ "$TARGET" = "secondary" ] || [ "$TARGET" = "all" ]; then
            if [ -z "${{ secrets.STACKGEN_TOKEN_2 }}" ] || [ -z "${{ vars.STACKGEN_URL_2 }}" ]; then
              echo "⚠️  Secondary instance not configured — STACKGEN_TOKEN_2 or STACKGEN_URL_2 missing"
              if [ "$TARGET" = "secondary" ]; then
                echo "❌ Cannot push to secondary without configuration"
                exit 1
              fi
            else
              echo "✅ Secondary instance configured: ${{ vars.STACKGEN_URL_2 }}"
            fi
          fi

      - name: Enumerate and push releases in semver order
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SCM_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          STACKGEN_TOKEN: ${{ secrets.STACKGEN_TOKEN_1 }}
          STACKGEN_URL: ${{ vars.STACKGEN_URL_1 }}
          STACKGEN_TOKEN_2: ${{ secrets.STACKGEN_TOKEN_2 }}
          STACKGEN_URL_2: ${{ vars.STACKGEN_URL_2 }}
          STACKGEN_PROVIDER_OVERRIDE: ${{ vars.STACKGEN_PROVIDER }}
          TARGET: ${{ github.event.inputs.target }}
          DRY_RUN: ${{ github.event.inputs.dry_run }}
          SCM_REPO: ${{ github.server_url }}/${{ github.repository }}
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "📋 ENUMERATING MODULE TAGS"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

          # Enumerate from git tags (not GitHub releases).
          # Forks inherit tags but NOT releases, so git tags are the reliable source.
          # Filter to only tags matching the module version pattern: <name>-v<semver> or <name>/v<semver>
          RELEASES_RAW=$(git tag -l | grep -E '[-/]v[0-9]+\.[0-9]+\.[0-9]+$' || true)

          if [ -z "$RELEASES_RAW" ]; then
            echo "📭 No module tags found (expected format: <module>-v<semver>)"
            exit 0
          fi

          # Sort by semantic version (ascending) so StackGen receives oldest → newest.
          # StackGen treats the last-pushed version as "latest", so order matters.
          #
          # Sorting approach: extract the version suffix, sort by it numerically,
          # then reconstruct the original tag order.
          RELEASES_SORTED=$(echo "$RELEASES_RAW" | while read -r tag; do
            # Extract the semver portion (after -v or /v)
            if [[ $tag =~ [-/]v([0-9]+\.[0-9]+\.[0-9]+)$ ]]; then
              echo "${BASH_REMATCH[1]} $tag"
            fi
          done | sort -t'.' -k1,1n -k2,2n -k3,3n | awk '{print $2}')

          TOTAL=$(echo "$RELEASES_SORTED" | wc -l | tr -d ' ')
          echo ""
          echo "Found $TOTAL releases (semver ascending order):"
          echo "$RELEASES_SORTED" | nl -ba
          echo ""
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

          # Counters
          PUSHED=0
          SKIPPED=0
          FAILED=0

          # Process each release sequentially in sorted order
          while IFS= read -r TAG_NAME; do
            [ -z "$TAG_NAME" ] && continue

            echo ""
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            PUSHED=$((PUSHED + 1))
            echo "📦 [$PUSHED/$TOTAL] Processing: $TAG_NAME"
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

            # Parse tag
            if [[ ! $TAG_NAME =~ ^(.+)[-/]v([0-9]+\.[0-9]+\.[0-9]+)$ ]]; then
              echo "   ⚠️  Tag does not match expected format — skipping"
              SKIPPED=$((SKIPPED + 1))
              continue
            fi

            MODULE_NAME="${BASH_REMATCH[1]}"
            SEMANTIC_VERSION="${BASH_REMATCH[2]}"
            MODULE_PATH="modules/${MODULE_NAME}"

            # Checkout the tag to get the correct module contents at that point in time
            git checkout "$TAG_NAME" --quiet 2>/dev/null || {
              echo "   ⚠️  Could not checkout tag $TAG_NAME — skipping"
              SKIPPED=$((SKIPPED + 1))
              continue
            }

            # Verify module path exists at this tag
            if [ ! -d "$MODULE_PATH" ]; then
              echo "   ⚠️  Module path not found: $MODULE_PATH — skipping"
              SKIPPED=$((SKIPPED + 1))
              continue
            fi

            # Auto-detect provider (override with STACKGEN_PROVIDER variable)
            if [ -n "$STACKGEN_PROVIDER_OVERRIDE" ]; then
              PROVIDER="$STACKGEN_PROVIDER_OVERRIDE"
            else
              AZURE_COUNT=$(find "$MODULE_PATH" -name "*.tf" -type f -exec grep -lE "(azurerm|hashicorp/azurerm)" {} \; 2>/dev/null | wc -l | tr -d ' ')
              AWS_COUNT=$(find "$MODULE_PATH" -name "*.tf" -type f -exec grep -lE "(aws_|hashicorp/aws)" {} \; 2>/dev/null | wc -l | tr -d ' ')
              GCP_COUNT=$(find "$MODULE_PATH" -name "*.tf" -type f -exec grep -lE "(google_|hashicorp/google)" {} \; 2>/dev/null | wc -l | tr -d ' ')
              if [ "$AZURE_COUNT" -gt "$AWS_COUNT" ] && [ "$AZURE_COUNT" -gt "$GCP_COUNT" ]; then
                PROVIDER="azure"
              elif [ "$GCP_COUNT" -gt "$AWS_COUNT" ]; then
                PROVIDER="gcp"
              elif [ "$AWS_COUNT" -gt 0 ]; then
                PROVIDER="aws"
              else
                PROVIDER="aws"
              fi
            fi

            echo "   Module:   $MODULE_NAME"
            echo "   Version:  v$SEMANTIC_VERSION"
            echo "   Path:     $MODULE_PATH"
            echo "   Provider: $PROVIDER"

            # --- Push to Primary Instance ---
            if [ "$TARGET" = "primary" ] || [ "$TARGET" = "all" ]; then
              if [ "$DRY_RUN" = "true" ]; then
                echo "   🔍 DRY RUN → primary ($STACKGEN_URL)"
              else
                echo "   📤 Uploading → primary ($STACKGEN_URL)..."
                if docker run --rm \
                  -v "${{ github.workspace }}:${{ github.workspace }}" \
                  -w "${{ github.workspace }}" \
                  -e STACKGEN_PROVIDER="$PROVIDER" \
                  -e SCM_TOKEN \
                  -e STACKGEN_TOKEN \
                  -e STACKGEN_URL \
                  -e SCM_REPO \
                  -e SCM_TAG="$TAG_NAME" \
                  -e SCM_TYPE=github \
                  ghcr.io/stackgenhq/stackgen:latest \
                  upload custom-modules \
                  --subdir "$MODULE_PATH" \
                  --name "$MODULE_NAME" \
                  --provider "$PROVIDER" \
                  --overwrite-version \
                  --version "v$SEMANTIC_VERSION"; then
                  echo "   ✅ Pushed to primary"
                else
                  echo "   ❌ Failed to push to primary"
                  FAILED=$((FAILED + 1))
                fi
              fi
            fi

            # --- Push to Secondary Instance (optional) ---
            if [ "$TARGET" = "all" ] || [ "$TARGET" = "secondary" ]; then
              if [ -z "$STACKGEN_TOKEN_2" ] || [ -z "$STACKGEN_URL_2" ]; then
                echo "   ⚠️  Skipping secondary — not configured"
              elif [ "$DRY_RUN" = "true" ]; then
                echo "   🔍 DRY RUN → secondary ($STACKGEN_URL_2)"
              else
                echo "   📤 Uploading → secondary ($STACKGEN_URL_2)..."
                if docker run --rm \
                  -v "${{ github.workspace }}:${{ github.workspace }}" \
                  -w "${{ github.workspace }}" \
                  -e STACKGEN_PROVIDER="$PROVIDER" \
                  -e SCM_TOKEN \
                  -e STACKGEN_TOKEN="$STACKGEN_TOKEN_2" \
                  -e STACKGEN_URL="$STACKGEN_URL_2" \
                  -e SCM_REPO \
                  -e SCM_TAG="$TAG_NAME" \
                  -e SCM_TYPE=github \
                  ghcr.io/stackgenhq/stackgen:latest \
                  upload custom-modules \
                  --subdir "$MODULE_PATH" \
                  --name "$MODULE_NAME" \
                  --provider "$PROVIDER" \
                  --overwrite-version \
                  --version "v$SEMANTIC_VERSION"; then
                  echo "   ✅ Pushed to secondary"
                else
                  echo "   ❌ Failed to push to secondary"
                  FAILED=$((FAILED + 1))
                fi
              fi
            fi

          done <<< "$RELEASES_SORTED"

          # Summary
          echo ""
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "📊 BACKFILL SUMMARY"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "   Total releases: $TOTAL"
          echo "   Processed:      $PUSHED"
          echo "   Skipped:        $SKIPPED"
          echo "   Failed:         $FAILED"
          if [ "$DRY_RUN" = "true" ]; then
            echo "   Mode:           DRY RUN (no uploads performed)"
          fi
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

          if [ "$FAILED" -gt 0 ]; then
            echo ""
            echo "⚠️  $FAILED upload(s) failed — check logs above"
            exit 1
          fi
