name: Trigger StackGen Webhook on New Issue

on:
  issues:
    types: [opened]

jobs:
  trigger-webhook:
    runs-on: ubuntu-latest
    steps:
      - name: Send Issue Creation Payload to StackGen
        # We use the github.event_path file which contains the complete JSON webhook payload for the event
        run: |
          curl -X POST "https://stage.dev.stackgen.com/guild/api/v1/webhooks/trigger" \
            -H "Authorization: Bearer ${{ secrets.STACKGEN_WEBHOOK_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d @${{ github.event_path }}
